<!DOCTYPE html>
<html>
<head>
  <title>Resolver Cubo 2x2</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    .card {
      background: #222;
      margin: 20px auto;
      padding: 15px;
      width: 300px;
      border-radius: 10px;
      cursor: pointer;
    }

    .algoritmo {
      display: none;
      margin-top: 10px;
      color: #0f0;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>Método rápido 2x2</h1>
<p>Aprendé a resolver el cubo en pocos pasos 🚀</p>

<div class="card" onclick="toggle('alg1')">
  <h3>Paso 1: Primera capa</h3>
  <div id="alg1" class="algoritmo">
    R U R' U'
  </div>
</div>

<div class="card" onclick="toggle('alg2')">
  <h3>Paso 2: Orientar última capa</h3>
  <div id="alg2" class="algoritmo">
    F R U R' U' F'
  </div>
</div>

<div class="card" onclick="toggle('alg3')">
  <h3>Paso 3: Permutar esquinas</h3>
  <div id="alg3" class="algoritmo">
    R U R' U' R' F R2 U' R' U' R U R' F'
  </div>
</div>

<script>
function toggle(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>

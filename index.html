<!DOCTYPE html>
<html>
<head>
  <title>Método 2x2</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      position: fixed;
      top: 10px;
      width: 100%;
      margin: 0;
    }

    .slide {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;
    }

    .active {
      display: flex;
    }

    img {
      max-width: 90%;
      max-height: 80%;
      border-radius: 10px;
    }

    .btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Método 2x2</h1>

<!-- SLIDES -->
<div class="slide active">
  <img src="paso1.jpg">
</div>

<div class="slide">
  <img src="paso2.jpg">
</div>

<div class="slide">
  <img src="paso3.jpg">
</div>

<!-- BOTÓN -->
<button class="btn" onclick="siguiente()">Siguiente ➡</button>

<script>
let actual = 0;
const slides = document.querySelectorAll(".slide");

function mostrar(i) {
  slides.forEach(s => s.classList.remove("active"));
  slides[i].classList.add("active");
}

function siguiente() {
  actual++;
  if (actual >= slides.length) actual = 0;
  mostrar(actual);
}
</script>

</body>
</html>
